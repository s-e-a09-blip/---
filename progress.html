<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Прогресс обучения</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="stile-header">
      <div class="container">
        <h1>Python учебник</h1>
        <nav class="nav2">
          <a href="index.html">Главная</a>
          <a href="progress.html">Прогресс</a>
          <a href="test.html">Контрольный тест</a>
        </nav>
      </div>
    </header>

    <main style="padding: 20px">
      <h1 style="text-align: center; margin-bottom: 20px">Мой прогресс</h1>

      <!-- Карточки статистики -->
      <div class="stats-cards" id="statsCards"></div>

      <!-- Таблица с тестами -->
      <table id="progressTable" class="table-per">
        <thead>
          <tr>
            <th>Тест</th>
            <th>Результат</th>
            <th>Статус</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr class="empty-message">
            <td colspan="3">
              📭 Пока нет данных о тестах. Пройдите тест, чтобы увидеть
              прогресс!
            </td>
          </tr>
        </tbody>
      </table>
      <!-- ← Этой строки не хватало -->

      <!-- Прогресс-бар -->
      <div class="progress-section">
        <div class="progress-header">
          <span>Общий прогресс</span>
          <span id="percentText">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-bar-fill" id="progressFill"></div>
        </div>
      </div>

      <!-- Кнопка сброса прогресса -->
      <div style="display: flex; justify-content: center; margin-top: 20px">
        <button class="test-btn reset-btn" id="resetBtn">
          🔄 Сбросить прогресс
        </button>
      </div>
    </main>

    <script>
      // Функция загрузки прогресса из localStorage (использует тот же ключ, что и тест)
      function loadProgress() {
        const saved = localStorage.getItem("progress");
        return saved ? JSON.parse(saved) : {};
      }

      // Функция обновления страницы
      function updateProgress() {
        const progress = loadProgress();

        const totalTests = Object.keys(progress).length;
        let passedCount = 0;
        let totalScore = 0;
        let totalMax = 0;

        Object.values(progress).forEach(({ score, total }) => {
          totalScore += score;
          totalMax += total;
          if (score === total) passedCount++;
        });

        const overallPercent =
          totalMax > 0 ? Math.round((totalScore / totalMax) * 100) : 0;

        // Обновляем таблицу
        const tableBody = document.getElementById("tableBody");

        if (totalTests === 0) {
          tableBody.innerHTML = `
                    <tr class="empty-message">
                        <td colspan="3">📭 Пока нет данных о тестах. Пройдите тест, чтобы увидеть прогресс!</td>
                    </tr>
                `;
        } else {
          tableBody.innerHTML = "";
          // Сортируем тесты по названию
          const sortedTests = Object.entries(progress).sort((a, b) =>
            a[0].localeCompare(b[0]),
          );

          sortedTests.forEach(([testName, { score, total }]) => {
            const row = document.createElement("tr");

            let badgeClass = "";
            let badgeText = "";
            if (score === total) {
              badgeClass = "badge-done";
              badgeText = "✅ Пройден";
            } else if (score === 0) {
              badgeClass = "badge-start";
              badgeText = "📖 Не начат";
            } else {
              badgeClass = "badge-progress";
              badgeText = "⚡ В процессе";
            }

            const percent = Math.round((score / total) * 100);
            let resultClass = "";
            if (percent >= 80) resultClass = "result-high";
            else if (percent >= 50) resultClass = "result-medium";
            else resultClass = "result-low";

            row.innerHTML = `
                        <td><strong>${testName}</strong></td>
                        <td class="${resultClass}">${score} / ${total}</td>
                        <td><span class="badge ${badgeClass}">${badgeText}</span></td>
                    `;
            tableBody.appendChild(row);
          });
        }

        // Обновляем прогресс-бар
        const fill = document.getElementById("progressFill");
        const percentText = document.getElementById("percentText");

        fill.style.width = overallPercent + "%";
        percentText.textContent = overallPercent + "%";

        if (overallPercent === 100) {
          fill.style.backgroundColor = "#00aa88";
        } else {
          fill.style.backgroundColor = "#3498db";
        }
      }

      // Кнопка сброса прогресса
      document.getElementById("resetBtn")?.addEventListener("click", () => {
        if (confirm("Вы уверены, что хотите сбросить весь прогресс?")) {
          localStorage.removeItem("progress");
          updateProgress();
        }
      });

      // Инициализация страницы
      updateProgress();

      // Слушаем изменения в localStorage (если данные изменились на другой вкладке)
      window.addEventListener("storage", (event) => {
        if (event.key === "progress") {
          updateProgress();
        }
      });
    </script>
  </body>
</html>
