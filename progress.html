<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Прогресс обучения</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="stile-header">
      <div class="container">
        <h1>Python учебник</h1>
        <nav class="nav2">
          <a href="index.html">Главная</a>
          <a href="progress.html">Прогресс</a>
          <a href="test.html">Контрольный тест</a>
        </nav>
      </div>
    </header>

    <main style="padding: 20px">
      <h1 style="text-align: center; margin-bottom: 20px">Прогресс</h1>

      <!-- Карточки статистики -->
      <div class="stats-cards" id="statsCards"></div>

      <!-- Таблица с тестами -->
      <table id="progressTable" class="table-per">
        <thead>
          <tr>
            <th>Тест</th>
            <th>Результат</th>
            <th>Статус</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>

      <!-- Прогресс-бар -->
      <div class="progress-section">
        <div class="progress-header">
          <span>Общий прогресс</span>
          <span id="percentText">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-bar-fill" id="progressFill"></div>
        </div>
      </div>
    </main>

    <script>
      // Данные из localStorage или пример
      const savedProgress = JSON.parse(localStorage.getItem("progress")) || {};

      // Пример данных
      const defaultTests = {
        "Математические операции": { score: 0, total: 6 },
        test1: { score: 9, total: 9 },
        test2: { score: 7, total: 7 },
        "Условные операторы": { score: 1, total: 7 },
        "Кортежи и строки": { score: 2, total: 7 },
      };

      const progress =
        Object.keys(savedProgress).length === 0 ? defaultTests : savedProgress;

      const totalTests = Object.keys(progress).length;
      let passedCount = 0;
      let totalScore = 0;
      let totalMax = 0;

      Object.values(progress).forEach(({ score, total }) => {
        totalScore += score;
        totalMax += total;
        if (score === total) passedCount++;
      });

      const overallPercent =
        totalMax > 0 ? Math.round((totalScore / totalMax) * 100) : 0;

      // Карточки статистики
      const statsCards = document.getElementById("statsCards");
      statsCards.innerHTML = `
      <div class="stat-card">
        <div class="stat-number">${totalTests}</div>
        <div class="stat-label">Всего тестов</div>
      </div>
      <div class="stat-card">
        <div class="stat-number">${passedCount}</div>
        <div class="stat-label">Пройдено полностью</div>
      </div>
      <div class="stat-card">
        <div class="stat-number">${totalScore}/${totalMax}</div>
        <div class="stat-label">Всего баллов</div>
      </div>
    `;

      // Таблица
      const tableBody = document.getElementById("tableBody");

      Object.entries(progress).forEach(([testName, { score, total }]) => {
        const row = document.createElement("tr");

        let badgeClass = "";
        let badgeText = "";
        if (score === total) {
          badgeClass = "badge-done";
          badgeText = "Пройден";
        } else if (score === 0) {
          badgeClass = "badge-start";
          badgeText = "Не начат";
        } else {
          badgeClass = "badge-progress";
          badgeText = "В процессе";
        }

        const percent = Math.round((score / total) * 100);
        let resultClass = "";
        if (percent >= 80) resultClass = "result-high";
        else if (percent >= 50) resultClass = "result-medium";
        else resultClass = "result-low";

        row.innerHTML = `
        <td>${testName}</td>
        <td class="${resultClass}">${score} / ${total}</td>
        <td><span class="badge ${badgeClass}">${badgeText}</span></td>
      `;
        tableBody.appendChild(row);
      });

      // Прогресс-бар
      const fill = document.getElementById("progressFill");
      const percentText = document.getElementById("percentText");

      fill.style.width = overallPercent + "%";
      percentText.textContent = overallPercent + "%";
    </script>
  </body>
</html>
